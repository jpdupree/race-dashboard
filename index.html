<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Race Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/race-theme.css?v=12">
<style>
  .cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; position: relative;
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column;
    transition: border-color 0.15s ease, transform 0.05s ease;
  }
  .card:hover { border-color: var(--border-bright); }
  .card:active { transform: scale(0.995); }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .card.status-live::before     { background: linear-gradient(90deg, var(--green), transparent); }
  .card.status-upcoming::before { background: linear-gradient(90deg, var(--blue), transparent); }
  .card.status-finished::before { background: linear-gradient(90deg, var(--text-muted), transparent); }
  .card-head {
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-name {
    font-family: 'Fraunces', serif; font-size: 24px;
    font-weight: 600; letter-spacing: -0.02em; line-height: 1.15;
  }
  .card-loc {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); margin-top: 6px; letter-spacing: 0.06em;
  }
  .card-body {
    padding: 16px 24px 20px; flex: 1;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card-row {
    display: flex; justify-content: space-between; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .card-row .k { color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; font-size: 10px; }
  .card-row .v { color: var(--text); text-align: right; }
  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 2px; border: 1px solid currentColor;
  }
  .badge.loops { color: var(--blue); }
  .badge.segments { color: var(--accent); }
  .badge.past { color: var(--text-muted); }

  .card-status {
    display: inline-flex; align-items: center; gap: 5px; align-self: flex-start;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 2px; border: 1px solid currentColor;
    margin-bottom: 10px;
  }
  .card-status.status-live { color: var(--green); }
  .card-status.status-upcoming { color: var(--blue); }
  .card-status.status-finished { color: var(--text-muted); }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .sort-control {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
  }
  .sort-control select {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--bg-elevated); color: var(--text);
    border: 1px solid var(--border-bright); border-radius: 4px;
    padding: 8px 10px; text-transform: none; letter-spacing: 0;
  }

  .empty {
    background: var(--bg-card); border: 1px dashed var(--border-bright);
    border-radius: 6px; padding: 48px 32px; text-align: center;
  }
  .empty h2 {
    font-family: 'Fraunces', serif; font-size: 28px;
    font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px;
  }
  .empty p {
    color: var(--text-dim); margin-bottom: 24px; line-height: 1.5;
    max-width: 480px; margin-left: auto; margin-right: auto;
  }
  .empty .cta {
    display: inline-block; padding: 14px 22px;
    background: var(--accent); color: #1a0a04;
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
    border-radius: 4px; text-decoration: none;
    border: 1px solid var(--accent);
  }
  .empty .cta:hover { background: #ff7d54; }

  .hub-actions {
    margin-bottom: 28px; display: flex; gap: 12px; flex-wrap: wrap;
    align-items: center;
  }
  .hub-actions a, .hub-actions button { text-decoration: none; }
  .card-badge {
    position: absolute; top: 14px; right: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 2px;
    background: rgba(255, 107, 61, 0.15); color: var(--accent);
    border: 1px solid var(--accent);
  }
  .card-badge.viewer { background: rgba(94, 200, 255, 0.12); color: var(--blue); border-color: var(--blue); }
</style>
</head>
<body>

<header class="site">
  <div class="brand">
    <div class="brand-meta">
      <span class="pulse"></span>
      <span>Race Hub</span>
    </div>
    <h1 class="site">Race <em>Hub</em></h1>
  </div>
</header>

<div id="error" class="error-banner" style="display:none;"></div>
<div id="body"></div>

<footer class="site">
  <div id="repo-link">—</div>
</footer>

<script src="lib/race-core.js?v=12"></script>
<script>
  const SORT_KEY = 'race-hub-sort-v1';
  let loadedRaces = [];
  // Slugs confirmed complete by checking the race data — a race can finish
  // before its cutoff time, so the time window alone isn't enough.
  const completedSlugs = new Set();

  // upcoming → not started; live → started, within the cutoff window;
  // finished → past the cutoff, OR every runner has finished. cutoffHours
  // falls back to 36 for older manifest entries that predate the field.
  function raceStatus(r) {
    if (completedSlugs.has(r.slug)) return 'finished';
    if (!r.startTime) return 'upcoming';
    const start = new Date(r.startTime).getTime();
    const now = Date.now();
    if (now < start) return 'upcoming';
    const end = start + (r.cutoffHours || 36) * 3600 * 1000;
    return now < end ? 'live' : 'finished';
  }

  // True when every configured runner has completed the course.
  function isRaceComplete(cfg, data) {
    const runners = cfg.runners || [];
    if (!runners.length) return false;
    return runners.every(r => {
      const d = (data.runners || []).find(x => x.id === r.id) || { legs: [] };
      return Race.compute.nextActionFor(d, cfg).state === 'finished';
    });
  }

  // For races still "live" by the clock, check the data — a runner may have
  // finished early. Flips those cards to "Finished" without a page reload.
  async function refineStatuses() {
    const live = loadedRaces.filter(r => raceStatus(r) === 'live');
    let changed = false;
    for (const r of live) {
      try {
        const cfg = await Race.gh.readRaceJson(r.slug, 'config.json');
        const data = await Race.gh.readRaceJson(r.slug, 'data.json');
        if (isRaceComplete(cfg, data)) { completedSlugs.add(r.slug); changed = true; }
      } catch (e) { /* leave it on the time-based status */ }
    }
    if (changed) renderList();
  }

  function statusRank(s) {
    return { live: 0, upcoming: 1, finished: 2 }[s] != null
      ? { live: 0, upcoming: 1, finished: 2 }[s] : 3;
  }

  function sortRaces(races, mode) {
    const me = (Race.auth.email() || '').toLowerCase();
    const rows = races.map(r => ({ r, s: raceStatus(r) }));
    const t = r => r.startTime ? new Date(r.startTime).getTime() : Infinity;
    const byStatusThenDate = (a, b) => {
      const d = statusRank(a.s) - statusRank(b.s);
      if (d) return d;
      // live & upcoming: soonest first; finished: most recent first.
      return a.s === 'finished' ? (t(b.r) - t(a.r)) : (t(a.r) - t(b.r));
    };
    if (mode === 'az') {
      rows.sort((a, b) => (a.r.name || '').localeCompare(b.r.name || ''));
    } else if (mode === 'owned') {
      rows.sort((a, b) => {
        const ao = (a.r.createdBy || '').toLowerCase() === me ? 0 : 1;
        const bo = (b.r.createdBy || '').toLowerCase() === me ? 0 : 1;
        return (ao - bo) || byStatusThenDate(a, b);
      });
    } else {
      rows.sort(byStatusThenDate);
    }
    return rows.map(x => x.r);
  }

  function renderCard(r) {
    const status = raceStatus(r);
    const finished = status === 'finished';
    const statusText = { live: 'Live', upcoming: 'Upcoming', finished: 'Finished' }[status];
    const courseLabel = r.courseType === 'loops' ? 'Loops' : 'Segments';
    const runners = (r.runnerNames || []).join(' · ') || '—';
    const startDate = r.startTime
      ? new Date(r.startTime).toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' })
      : '—';
    const dist = r.totalDistanceMi != null ? `${r.totalDistanceMi} mi` : '—';
    let badge = '';
    if (r.visibility === 'private') {
      const cls = r.role === 'viewer' ? 'viewer' : '';
      badge = `<span class="card-badge ${cls}">Private${r.role ? ' · ' + r.role : ''}</span>`;
    } else if (r.role === 'editor') {
      badge = `<span class="card-badge">Editor</span>`;
    }
    return `
      <a class="card status-${status}" href="race.html?id=${encodeURIComponent(r.slug)}">
        ${badge}
        <div class="card-head">
          <div class="card-status status-${status}">${status === 'live' ? '<span class="live-dot"></span>' : ''}${statusText}</div>
          <div class="card-name">${escapeHtml(r.name)}</div>
          <div class="card-loc">${escapeHtml(r.location || '')}</div>
        </div>
        <div class="card-body">
          <div class="card-row"><span class="k">Date</span><span class="v">${startDate}</span></div>
          <div class="card-row"><span class="k">Distance</span><span class="v">${dist}</span></div>
          <div class="card-row"><span class="k">Course</span><span class="v"><span class="badge ${finished ? 'past' : r.courseType}">${courseLabel}</span></span></div>
          <div class="card-row"><span class="k">Runners</span><span class="v">${escapeHtml(runners)}</span></div>
        </div>
      </a>
    `;
  }

  function renderList() {
    const sel = document.getElementById('sort-mode');
    if (!sel) return;
    localStorage.setItem(SORT_KEY, sel.value);
    document.getElementById('cards').innerHTML =
      sortRaces(loadedRaces, sel.value).map(renderCard).join('');
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  async function load() {
    try {
      await Race.hub.load();
      const isProxy = Race.hub.isProxyMode();
      const isAuthed = isProxy && Race.auth.has();

      // Public manifest (anonymous) — always loaded direct from Pages so it
      // works without a worker. Treats 404 as "no manifest yet" (empty hub).
      let publicRaces = [];
      try {
        const res = await fetch('races/index.json?_=' + Date.now(), { cache: 'no-store' });
        if (res.ok) {
          const manifest = await res.json();
          publicRaces = manifest.races || [];
        }
      } catch (e) { /* empty hub is fine */ }

      // If the user is signed in via the proxy, /my-races merges public races
      // (annotated with their role) plus any private races they're invited to.
      let races = publicRaces;
      let myErr = null;
      if (isAuthed) {
        try {
          const my = await Race.api.myRaces();
          races = (my && my.races) || races;
        } catch (err) {
          myErr = err;
          // Fall back to the public list; the error is rendered as a soft notice below.
        }
      }

      const body = document.getElementById('body');

      if (races.length === 0) {
        body.innerHTML = `
          <div class="empty">
            <h2>No races yet</h2>
            <p>${isAuthed
              ? "Set up your first race with the wizard. You'll be its only editor; you can invite crew and generate share links from the race page after creation."
              : "Set up your first race with the wizard — it'll handle the GitHub commits for you, then you'll have a live dashboard and pit board ready for race day."}</p>
            <a class="cta" href="setup.html">Set up a race →</a>
            ${isProxy && !isAuthed ? `<p style="margin-top: 18px; font-size: 12px;"><a href="setup.html" style="color: var(--accent);">Sign in</a> to see private races you've been invited to.</p>` : ''}
          </div>
        `;
      } else {
        loadedRaces = races;
        body.innerHTML = `
          <div class="hub-actions">
            <a class="btn primary" href="setup.html">+ New race</a>
            <label class="sort-control">Sort
              <select id="sort-mode">
                <option value="status">Live / upcoming / past</option>
                <option value="az">Name (A–Z)</option>
                ${isAuthed ? '<option value="owned">Owned first</option>' : ''}
              </select>
            </label>
          </div>
          ${myErr ? `<div class="error-banner" style="display:block; margin-bottom: 16px;">Could not load private races: ${escapeHtml(myErr.message)}</div>` : ''}
          <div class="cards" id="cards"></div>
        `;
        const sel = document.getElementById('sort-mode');
        const saved = localStorage.getItem(SORT_KEY) || 'status';
        if ([...sel.options].some(o => o.value === saved)) sel.value = saved;
        sel.addEventListener('change', renderList);
        renderList();
        refineStatuses();
      }

      // Repo link for footer
      const cfg = Race.config.load() || Race.config.detectDefaults();
      if (cfg.owner && cfg.repo) {
        document.getElementById('repo-link').innerHTML =
          `<a href="https://github.com/${cfg.owner}/${cfg.repo}" target="_blank" rel="noopener" style="color: inherit; text-decoration: underline;">${cfg.owner}/${cfg.repo}</a>`;
      }
    } catch (err) {
      const e = document.getElementById('error');
      e.style.display = 'block';
      e.textContent = `Error: ${err.message}`;
    }
  }

  load();
</script>

</body>
</html>

name = "race-dashboard-proxy"
main = "src/worker.js"
compatibility_date = "2026-05-01"

# Non-secret config goes here. Sensitive values are set via
# `wrangler secret put <NAME>` so they never end up in git.
[vars]
GITHUB_OWNER = "jpdupree"
GITHUB_REPO = "race-dashboard"
GITHUB_BRANCH = "main"
# If you mount the worker at a subpath (e.g. on a route like
# api.example.com/race-dashboard/*), set MOUNT_PATH to that prefix.
# Leave empty if the worker is at the root of its hostname.
MOUNT_PATH = ""
# Comma-separated origins allowed by CORS. "*" allows any caller.
ALLOWED_ORIGINS = "*"

# Secrets to set with `wrangler secret put`:
#   GITHUB_TOKEN   PAT with Contents: Read and write
#   JWT_SECRET     long random string
#   USERS          JSON array of users, generated by admin/hash.html

# To route this worker at api.thebillymangames.com/race-dashboard/*, add
# a route in the Cloudflare dashboard or uncomment + edit:
# [[routes]]
# pattern = "api.thebillymangames.com/race-dashboard/*"
# zone_name = "thebillymangames.com"

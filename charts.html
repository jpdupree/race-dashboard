<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/race-theme.css?v=4">
<style>
  .chart-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 22px 24px; margin-bottom: 24px;
    position: relative;
  }
  .chart-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .chart-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px; flex-wrap: wrap; gap: 12px;
  }
  .chart-title {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
    letter-spacing: -0.02em;
  }
  .chart-sub {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .chart-legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: -1px; }
  .chart-svg { width: 100%; height: auto; display: block; }
  .chart-svg .axis text { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: var(--text-muted); }
  .chart-svg .axis line { stroke: var(--border); stroke-width: 1; }
  .chart-svg .grid line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 4; opacity: 0.6; }
  .chart-svg .data-line { fill: none; stroke-width: 2; }
  .chart-svg .data-dot  { stroke-width: 0; }
  .chart-svg .target { stroke: var(--yellow); stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
  .chart-svg .target-label { fill: var(--yellow); font-size: 10px; }
  .chart-svg .cutoff { stroke: var(--red); stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
  .chart-svg .bar { stroke: none; }

  .intake-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;
  }
  @media (max-width: 900px) { .intake-grid { grid-template-columns: 1fr; } }
  .intake-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 18px 20px;
  }
  .intake-card h3 {
    font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<header class="site">
  <div class="brand">
    <div class="brand-meta">
      <span>Charts</span><span>·</span>
      <a href="#" id="back-link" style="color: inherit; text-decoration: none;">← Race</a>
    </div>
    <h1 class="site" id="race-title">Loading…</h1>
  </div>
</header>

<div id="error" class="error-banner" style="display:none;"></div>
<div id="body"></div>

<footer class="site">
  <span id="last-updated">—</span>
  <span>Charts auto-refresh every 30s</span>
</footer>

<script src="lib/race-core.js?v=4"></script>
<script>
  const slug = Race.qs('id');
  if (!slug) { window.location = 'index.html'; }
  document.getElementById('back-link').href = `race.html?id=${encodeURIComponent(slug)}`;

  let cfg = null, data = null;

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---------- tiny chart helpers ----------
  // Generic line/bar chart on an SVG viewBox 0,0 W H.
  // series: [{ name, color, points: [{x, y}] }]
  // opts: { yLabel, xLabel, yFmt, xTicks, target, cutoff }
  function linePath(points, xScale, yScale) {
    if (!points.length) return '';
    return points.map((p, i) => (i === 0 ? 'M' : 'L') + xScale(p.x).toFixed(1) + ',' + yScale(p.y).toFixed(1)).join(' ');
  }

  function makeLineChart(svgId, series, opts) {
    const svg = document.getElementById(svgId);
    if (!svg) return;
    const W = 1000, H = opts.height || 320;
    const padL = 56, padR = 16, padT = 16, padB = 32;
    const innerW = W - padL - padR, innerH = H - padT - padB;

    const allX = series.flatMap(s => s.points.map(p => p.x));
    const allY = series.flatMap(s => s.points.map(p => p.y));
    if (opts.target != null) allY.push(opts.target);
    const xMin = opts.xMin != null ? opts.xMin : Math.min(...allX, 0);
    const xMax = opts.xMax != null ? opts.xMax : Math.max(...allX, 1);
    const yMin = opts.yMin != null ? opts.yMin : Math.min(...allY, 0);
    const yMax = opts.yMax != null ? opts.yMax : Math.max(...allY, 1);

    const xScale = x => padL + ((x - xMin) / Math.max(0.001, xMax - xMin)) * innerW;
    const yScale = y => padT + innerH - ((y - yMin) / Math.max(0.001, yMax - yMin)) * innerH;

    // grid + ticks
    const xTicks = opts.xTicks || 6;
    const yTicks = opts.yTicks || 5;
    let grid = '';
    let xAxis = '';
    let yAxis = '';
    for (let i = 0; i <= yTicks; i++) {
      const y = yMin + (i / yTicks) * (yMax - yMin);
      const yy = yScale(y).toFixed(1);
      grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}"/>`;
      yAxis += `<text x="${padL - 8}" y="${yy}" text-anchor="end" dominant-baseline="middle">${(opts.yFmt ? opts.yFmt(y) : y.toFixed(1))}</text>`;
    }
    for (let i = 0; i <= xTicks; i++) {
      const x = xMin + (i / xTicks) * (xMax - xMin);
      const xx = xScale(x).toFixed(1);
      xAxis += `<text x="${xx}" y="${H - padB + 16}" text-anchor="middle">${(opts.xFmt ? opts.xFmt(x) : x.toFixed(1))}</text>`;
    }

    // axes
    const axisLines = `
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}"/>
      <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}"/>
    `;

    let lines = '';
    for (const s of series) {
      const d = linePath(s.points, xScale, yScale);
      lines += `<path class="data-line" d="${d}" stroke="${s.color}"/>`;
      if (opts.dots !== false) {
        for (const p of s.points) {
          lines += `<circle class="data-dot" cx="${xScale(p.x).toFixed(1)}" cy="${yScale(p.y).toFixed(1)}" r="3" fill="${s.color}"/>`;
        }
      }
    }

    let target = '';
    if (opts.target != null && opts.target >= yMin && opts.target <= yMax) {
      const ty = yScale(opts.target).toFixed(1);
      target = `<line class="target" x1="${padL}" y1="${ty}" x2="${W - padR}" y2="${ty}"/>
                <text class="target-label" x="${W - padR}" y="${ty - 4}" text-anchor="end">target ${opts.yFmt ? opts.yFmt(opts.target) : opts.target}</text>`;
    }
    let cutoff = '';
    if (opts.cutoff != null && opts.cutoff >= yMin && opts.cutoff <= yMax) {
      const cy = yScale(opts.cutoff).toFixed(1);
      cutoff = `<line class="cutoff" x1="${padL}" y1="${cy}" x2="${W - padR}" y2="${cy}"/>
                <text class="target-label" style="fill: var(--red);" x="${W - padR}" y="${cy + 14}" text-anchor="end">cutoff</text>`;
    }

    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.innerHTML = `
      <g class="grid">${grid}</g>
      <g class="axis">${axisLines}${xAxis}${yAxis}</g>
      ${target}${cutoff}
      ${lines}
    `;
  }

  function makeBarChart(svgId, points, opts) {
    const svg = document.getElementById(svgId);
    if (!svg || !points.length) return;
    const W = 1000, H = opts.height || 260;
    const padL = 56, padR = 16, padT = 16, padB = 32;
    const innerW = W - padL - padR, innerH = H - padT - padB;
    const yMax = Math.max(...points.map(p => p.y), opts.yMin || 1);
    const yMin = 0;
    const xMin = Math.min(...points.map(p => p.x), 1);
    const xMax = Math.max(...points.map(p => p.x), 1);
    const xScale = x => padL + ((x - xMin) / Math.max(0.001, xMax - xMin)) * innerW;
    const yScale = y => padT + innerH - ((y - yMin) / (yMax - yMin)) * innerH;
    const barW = Math.max(6, innerW / Math.max(1, points.length) * 0.7);

    let grid = '', xAxis = '', yAxis = '';
    for (let i = 0; i <= 5; i++) {
      const y = (i / 5) * yMax;
      const yy = yScale(y).toFixed(1);
      grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}"/>`;
      yAxis += `<text x="${padL - 8}" y="${yy}" text-anchor="end" dominant-baseline="middle">${(opts.yFmt ? opts.yFmt(y) : y.toFixed(0))}</text>`;
    }
    for (const p of points) {
      const xx = xScale(p.x).toFixed(1);
      xAxis += `<text x="${xx}" y="${H - padB + 16}" text-anchor="middle">${(opts.xFmt ? opts.xFmt(p.x) : p.x)}</text>`;
    }
    let bars = '';
    for (const p of points) {
      const x = xScale(p.x) - barW/2;
      const y = yScale(p.y);
      const h = (yScale(0) - y);
      bars += `<rect class="bar" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(1, h).toFixed(1)}" fill="${p.color || 'var(--accent)'}"/>`;
    }
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.innerHTML = `
      <g class="grid">${grid}</g>
      <g class="axis">
        <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}"/>
        <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}"/>
        ${xAxis}${yAxis}
      </g>
      ${bars}
    `;
  }

  // ---------- build charts ----------
  function build() {
    const runners = (data.runners || []).map(d => {
      const meta = (cfg.runners || []).find(r => r.id === d.id) || {};
      return { ...meta, ...d };
    });
    const t = cfg.targets || {};
    const start = new Date(cfg.startTime);
    const cutoffHours = cfg.cutoffs?.totalHours || 0;
    const totalDist = Race.course.totalDistanceMi(cfg);

    // Legend
    const legendHtml = runners.map(r =>
      `<span><span class="legend-dot" style="background:${r.color || 'var(--accent)'}"></span>${escapeHtml(r.name)}</span>`
    ).join('');

    document.getElementById('body').innerHTML = `
      <div class="chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Leg time</div>
            <div class="chart-sub">Time per leg, by leg index</div>
          </div>
          <div class="chart-legend">${legendHtml}</div>
        </div>
        <svg id="chart-leg-time" class="chart-svg"></svg>
      </div>

      <div class="chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Mile pace</div>
            <div class="chart-sub">Per-leg pace (min / mi)</div>
          </div>
          <div class="chart-legend">${legendHtml}</div>
        </div>
        <svg id="chart-pace" class="chart-svg"></svg>
      </div>

      <div class="chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Aid station time</div>
            <div class="chart-sub">Minutes in aid/pit, by stop number</div>
          </div>
          <div class="chart-legend">${legendHtml}</div>
        </div>
        <svg id="chart-pit" class="chart-svg"></svg>
      </div>

      <div class="intake-grid">
        <div class="intake-card">
          <h3>Calories / hour</h3>
          <svg id="chart-cal" class="chart-svg"></svg>
        </div>
        <div class="intake-card">
          <h3>Fluid oz / hour</h3>
          <svg id="chart-fluid" class="chart-svg"></svg>
        </div>
        <div class="intake-card">
          <h3>Sodium mg / hour</h3>
          <svg id="chart-sodium" class="chart-svg"></svg>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-head">
          <div>
            <div class="chart-title">Cumulative progress</div>
            <div class="chart-sub">Miles covered over race time; cutoff line shown</div>
          </div>
          <div class="chart-legend">${legendHtml}</div>
        </div>
        <svg id="chart-cum" class="chart-svg"></svg>
      </div>
    `;

    // Build per-leg duration series
    const legCount = Race.course.legCount(cfg);

    const legTimeSeries = runners.map(r => {
      const pts = [];
      for (const l of (r.legs || [])) {
        if (l.startTime && l.endTime) {
          const sec = (new Date(l.endTime) - new Date(l.startTime)) / 1000;
          pts.push({ x: l.index, y: sec });
        }
      }
      return { name: r.name, color: r.color || 'var(--accent)', points: pts };
    });
    makeLineChart('chart-leg-time', legTimeSeries, {
      height: 320, xMin: 1, xMax: legCount,
      yFmt: s => Race.fmt.durationShort(s),
      xFmt: x => 'L' + Math.round(x),
      xTicks: Math.min(legCount, 10)
    });

    const paceSeries = runners.map(r => {
      const pts = [];
      for (const l of (r.legs || [])) {
        if (l.startTime && l.endTime) {
          const def = Race.course.legAt(cfg, l.index);
          const dist = def?.distanceMi || 0;
          if (dist > 0) {
            const secPerMile = ((new Date(l.endTime) - new Date(l.startTime)) / 1000) / dist;
            pts.push({ x: l.index, y: secPerMile });
          }
        }
      }
      return { name: r.name, color: r.color || 'var(--accent)', points: pts };
    });
    makeLineChart('chart-pace', paceSeries, {
      height: 260, xMin: 1, xMax: legCount,
      yFmt: s => Race.fmt.pace(s),
      xFmt: x => 'L' + Math.round(x),
      xTicks: Math.min(legCount, 10)
    });

    // Aid station / pit times: gaps between consecutive legs.
    const pitSeries = runners.map(r => {
      const sorted = (r.legs || []).slice().sort((a, b) => a.index - b.index);
      const pts = [];
      for (let i = 0; i < sorted.length - 1; i++) {
        if (sorted[i].endTime && sorted[i+1].startTime) {
          const sec = (new Date(sorted[i+1].startTime) - new Date(sorted[i].endTime)) / 1000;
          pts.push({ x: sorted[i].index, y: sec / 60 });
        }
      }
      return { name: r.name, color: r.color || 'var(--accent)', points: pts };
    });
    makeLineChart('chart-pit', pitSeries, {
      height: 240, xMin: 1, xMax: Math.max(1, legCount - 1),
      yFmt: y => y.toFixed(0) + 'm',
      xFmt: x => '#' + Math.round(x),
      xTicks: Math.min(legCount, 10)
    });

    // Intake per-hour by leg
    const intakeOne = (extract, target) => runners.map(r => {
      const pts = [];
      for (const l of (r.legs || [])) {
        if (l.startTime && l.endTime) {
          const hours = ((new Date(l.endTime) - new Date(l.startTime)) / 1000) / 3600;
          const val = extract(l);
          if (val != null && hours > 0) pts.push({ x: l.index, y: val / hours });
        }
      }
      return { name: r.name, color: r.color || 'var(--accent)', points: pts };
    });

    makeLineChart('chart-cal',    intakeOne(l => l.calories, t.caloriesPerHour),
      { height: 220, xMin: 1, xMax: legCount, target: t.caloriesPerHour, yFmt: y => Math.round(y) });
    makeLineChart('chart-fluid',  intakeOne(l => l.fluidOz, t.fluidOzPerHour),
      { height: 220, xMin: 1, xMax: legCount, target: t.fluidOzPerHour, yFmt: y => y.toFixed(1) });
    makeLineChart('chart-sodium', intakeOne(l => l.sodiumMg, t.sodiumMgPerHour),
      { height: 220, xMin: 1, xMax: legCount, target: t.sodiumMgPerHour, yFmt: y => Math.round(y) });

    // Cumulative progress: x = race elapsed hours; y = miles done.
    const cumSeries = runners.map(r => {
      const sorted = (r.legs || []).slice().sort((a, b) => a.index - b.index);
      const pts = [{ x: 0, y: 0 }];
      let miles = 0;
      for (const l of sorted) {
        if (l.endTime) {
          const def = Race.course.legAt(cfg, l.index);
          miles += def?.distanceMi || 0;
          const elapsedH = (new Date(l.endTime) - start) / 3600000;
          pts.push({ x: elapsedH, y: miles });
        }
      }
      return { name: r.name, color: r.color || 'var(--accent)', points: pts };
    });
    makeLineChart('chart-cum', cumSeries, {
      height: 360,
      xMin: 0, xMax: cutoffHours || 24,
      yMin: 0, yMax: totalDist,
      cutoff: totalDist,
      yFmt: y => y.toFixed(0) + 'mi',
      xFmt: x => x.toFixed(0) + 'h',
      dots: false
    });
  }

  async function load() {
    try {
      const [cfgRes, dataRes] = await Promise.all([
        fetch(`races/${encodeURIComponent(slug)}/config.json?_=${Date.now()}`, { cache: 'no-store' }),
        fetch(`races/${encodeURIComponent(slug)}/data.json?_=${Date.now()}`, { cache: 'no-store' })
      ]);
      if (!cfgRes.ok) throw new Error('config.json not found');
      if (!dataRes.ok) throw new Error('data.json not found');
      cfg = await cfgRes.json();
      data = await dataRes.json();
      document.title = `Charts · ${cfg.name}`;
      document.getElementById('race-title').textContent = cfg.name;
      document.getElementById('error').style.display = 'none';
      build();
      document.getElementById('last-updated').textContent = data.lastUpdated
        ? 'Updated ' + new Date(data.lastUpdated).toLocaleString()
        : 'Awaiting data';
    } catch (err) {
      const e = document.getElementById('error');
      e.style.display = 'block';
      e.textContent = `Error: ${err.message}`;
    }
  }

  load();
  setInterval(load, 30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Race · Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/race-theme.css?v=13">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  .cutoffs {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 4px; padding: 18px 24px; margin-bottom: 32px;
    display: grid; grid-template-columns: auto 1fr auto auto auto;
    gap: 32px; align-items: center;
  }
  @media (max-width: 800px) { .cutoffs { grid-template-columns: 1fr 1fr; gap: 16px; } }
  .cutoffs-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  }
  .cutoff-item { display: flex; flex-direction: column; gap: 2px; }
  .cutoff-item .v { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
  .cutoff-item .l { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .cutoff-item.warn .v { color: var(--yellow); }
  .cutoff-item.danger .v { color: var(--red); }

  .race-clock { text-align: right; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .race-clock .label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  }
  .race-clock .time {
    font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
  }

  .runners { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 1100px) { .runners { grid-template-columns: 1fr; } }
  .runners.single { grid-template-columns: 1fr; max-width: 900px; margin: 0 auto; }

  .runner {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; position: relative;
  }
  .runner::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--runner-color, var(--accent)), transparent);
  }
  .runner-head {
    padding: 24px 28px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-end; gap: 16px;
  }
  .runner-name {
    font-family: 'Fraunces', serif; font-size: 32px;
    font-weight: 600; letter-spacing: -0.02em;
  }
  .runner-bib {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 0.1em;
    text-transform: uppercase; margin-top: 4px;
  }
  .status-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 2px; border: 1px solid currentColor;
  }
  .status-onpace { color: var(--green); }
  .status-tight { color: var(--yellow); }
  .status-offpace { color: var(--red); }
  .status-notstarted { color: var(--text-muted); }
  .status-finished { color: var(--accent); }

  .stats {
    display: grid; grid-template-columns: repeat(8, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    padding: 16px 14px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
  }
  .stat:last-child { border-right: none; }
  .stat.live .value, .stat.live-course .value { color: var(--accent); }
  .stat.live-pit .value { color: var(--green); }
  .stat.live-course .label, .stat.live-pit .label {
    animation: liveBlink 2s ease-in-out infinite;
  }
  @keyframes liveBlink {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
  .stat .label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted);
  }
  .stat .value {
    font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700;
    letter-spacing: -0.02em; color: var(--text);
  }
  .stat .sub { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  @media (max-width: 1400px) {
    .stats { grid-template-columns: repeat(4, 1fr); }
    .stat { border-bottom: 1px solid var(--border); }
    .stat:nth-child(4n) { border-right: none; }
    .stat:nth-last-child(-n+4) { border-bottom: none; }
  }
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat:nth-child(2n) { border-right: none; }
    .stat:nth-last-child(-n+2) { border-bottom: none; }
    .stat { padding: 14px 12px; }
  }

  .intake { padding: 20px 28px 24px; border-bottom: 1px solid var(--border); }
  .intake-title {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 14px;
  }
  .intake-row {
    display: grid; grid-template-columns: 90px 1fr auto auto;
    gap: 14px; align-items: center; padding: 8px 0;
  }
  .intake-row .name { font-size: 13px; color: var(--text-dim); }
  .bar-track {
    height: 6px; background: var(--border); border-radius: 3px;
    overflow: hidden; position: relative;
  }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .bar-fill.good { background: var(--green); }
  .bar-fill.warn { background: var(--yellow); }
  .bar-fill.low { background: var(--red); }
  .intake-row .num {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    font-weight: 600; text-align: right; min-width: 90px;
  }
  .intake-row .target {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); min-width: 60px; text-align: right;
  }

  .legs-section { padding: 20px 28px 28px; }
  .legs-head {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 14px;
  }
  .legs-title {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  }

  /* Loops grid (Bloodroot style) */
  .legs-grid {
    display: grid; grid-template-columns: repeat(10, 1fr);
    gap: 6px; margin-bottom: 16px;
  }
  @media (max-width: 600px) { .legs-grid { grid-template-columns: repeat(5, 1fr); } }
  .leg-cell {
    aspect-ratio: 1; background: var(--bg-elevated);
    border: 1px solid var(--border); border-radius: 3px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    font-family: 'JetBrains Mono', monospace;
  }
  .leg-cell .n { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
  .leg-cell .t { font-size: 11px; font-weight: 700; }
  .leg-cell.done { background: rgba(110, 231, 168, 0.08); border-color: rgba(110, 231, 168, 0.4); }
  .leg-cell.done .t { color: var(--green); }
  .leg-cell.slow { background: rgba(245, 196, 81, 0.08); border-color: rgba(245, 196, 81, 0.4); }
  .leg-cell.slow .t { color: var(--yellow); }
  .leg-cell.danger { background: rgba(255, 89, 89, 0.08); border-color: rgba(255, 89, 89, 0.4); }
  .leg-cell.danger .t { color: var(--red); }
  .leg-cell.current { background: var(--accent-glow); border-color: var(--accent); }
  .leg-cell.current .t { color: var(--accent); }

  /* Segments timeline (Sangre-style) */
  .seg-list { display: flex; flex-direction: column; }
  .seg-row {
    display: grid; grid-template-columns: 32px 1fr 80px 80px 80px;
    gap: 10px; padding: 10px 8px;
    border-bottom: 1px solid var(--border);
    align-items: center; font-size: 12px;
  }
  @media (max-width: 700px) {
    .seg-row { grid-template-columns: 28px 1fr 60px; }
    .seg-row .col-cut, .seg-row .col-pit { display: none; }
  }
  .seg-row:last-child { border-bottom: none; }
  .seg-row .num { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 700; }
  .seg-row .nm { color: var(--text); }
  .seg-row .nm .meta { color: var(--text-muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
  .seg-row .col-dur, .seg-row .col-cut, .seg-row .col-pit {
    font-family: 'JetBrains Mono', monospace; text-align: right;
  }
  .seg-row .col-dur { color: var(--text); }
  .seg-row .col-cut { color: var(--text-muted); font-size: 11px; }
  .seg-row .col-pit { color: var(--text-dim); font-size: 11px; }
  .seg-row.done { background: rgba(110, 231, 168, 0.05); }
  .seg-row.done .col-dur { color: var(--green); }
  .seg-row.current { background: var(--accent-glow); }
  .seg-row.current .col-dur { color: var(--accent); }
  .seg-row.current .col-dur::after { content: ' ●'; }
  .seg-row.danger .col-dur { color: var(--red); }

  /* Leg log */
  .leglog { border-top: 1px solid var(--border); margin-top: 8px; }
  .leglog-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 2px 6px;
    cursor: pointer; user-select: none;
  }
  .leglog-head:hover .leglog-toggle { color: var(--accent); border-color: var(--accent); }
  .leglog-head-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 600; }
  .leglog-toggle {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);
    border: 1px solid var(--border-bright); border-radius: 3px; padding: 4px 9px;
  }
  .leglog-toggle::before { content: '▼ '; }
  .leglog.collapsed .leglog-toggle::before { content: '▶ '; }
  .leglog.collapsed tr.leg-old, .leglog.collapsed tr.note-old { display: none; }
  .leglog.collapsed .when-expanded, .leglog:not(.collapsed) .when-collapsed { display: none; }
  .leglog table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .leglog th {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted);
    text-align: left; padding: 14px 8px 10px; font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .leglog th:first-child { padding-left: 0; }
  .leglog th.num, .leglog td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .leglog td { padding: 12px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .leglog td:first-child { padding-left: 0; }
  .leglog tr:last-child td { border-bottom: none; }
  .leglog .leg-num {
    font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600;
    color: var(--accent); width: 30px;
  }
  .leglog tr.leg-row:has(+ tr.note-row) td { border-bottom: none; padding-bottom: 6px; }
  .leglog tr.note-row td {
    padding: 0 8px 12px 8px; padding-left: 38px;
    font-size: 11px; color: var(--text-dim); line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }
  .leglog tr.note-row:last-child td { border-bottom: none; }
  .leglog tr.empty td { color: var(--text-muted); font-style: italic; text-align: center; padding: 24px; }

  .legend { display: flex; gap: 18px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* Manage access panel */
  .access {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; margin: 0 0 24px;
  }
  .access-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 22px; cursor: pointer; user-select: none;
    border-bottom: 1px solid transparent;
  }
  .access.open .access-head { border-bottom-color: var(--border); }
  .access:not(.open) .access-body { display: none; }
  .access-head-title {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);
  }
  .access-head-toggle {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim);
    border: 1px solid var(--border-bright); border-radius: 3px; padding: 4px 9px;
  }
  .access-head:hover .access-head-toggle { color: var(--accent); border-color: var(--accent); }
  .access:not(.open) .access-head-toggle::before { content: '▶ '; }
  .access.open .access-head-toggle::before { content: '▼ '; }
  .access-body { padding: 18px 22px 22px; }
  .access-section { margin-bottom: 22px; }
  .access-section:last-child { margin-bottom: 0; }
  .access-section-title {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 10px;
  }
  .access-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .access-list .row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 12px;
    align-items: center; padding: 8px 12px;
    background: var(--bg-elevated); border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .access-list .row .who { color: var(--text); word-break: break-all; }
  .access-list .row .tag {
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 2px; color: var(--text-muted);
    border: 1px solid var(--border-bright);
  }
  .access-list .row .tag.editor { color: var(--accent); border-color: var(--accent); }
  .access-list .row .tag.viewer { color: var(--blue); border-color: var(--blue); }
  .access-list .row .tag.creator { color: var(--green); border-color: var(--green); }
  .access-list .row button {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 4px 8px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer;
  }
  .access-list .row button:hover { color: var(--red); border-color: var(--red); }
  .access-list .empty {
    padding: 10px 12px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    font-style: italic;
  }
  .access-add { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .access-add input[type="email"] {
    flex: 1 1 200px; padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .access-add select {
    padding: 8px 10px; background: var(--bg-elevated);
    border: 1px solid var(--border-bright); border-radius: 4px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .access-add button {
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .access-help {
    font-size: 11px; color: var(--text-dim); line-height: 1.55;
    background: var(--bg-elevated); padding: 10px 12px; border-radius: 4px;
    border-left: 2px solid var(--accent); margin-top: 10px;
  }
  .access-invite-result, .access-share-result {
    margin-top: 10px; padding: 10px 12px;
    background: var(--bg-elevated); border: 1px solid rgba(110, 231, 168, 0.4);
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    word-break: break-all;
  }
  .access-invite-result .url, .access-share-result .url { color: var(--green); margin-top: 6px; display: block; }
  .access-invite-result .copy, .access-share-result .copy {
    margin-top: 8px; padding: 6px 10px;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .access-err { color: var(--red); margin-top: 8px; font-size: 11px; }
  .share-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; padding: 8px 12px;
    background: var(--bg-elevated); border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; align-items: center; }
  .share-row .lbl { color: var(--text-muted); }
  .share-row .url { color: var(--text); word-break: break-all; }
  .share-row button {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 4px 8px; border-radius: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer;
  }
  .share-row button.copy:hover { color: var(--accent); border-color: var(--accent); }
  .share-row button.revoke:hover { color: var(--red); border-color: var(--red); }
  .share-banner {
    background: var(--bg-card); border: 1px solid var(--blue);
    color: var(--text); padding: 10px 16px; border-radius: 4px;
    margin: 0 0 18px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .share-banner .em { color: var(--blue); }

  /* Course map */
  #course-map-section { margin-bottom: 24px; }
  .course-map-head {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 10px;
  }
  .course-map-title {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  }
  .course-map-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-dim);
  }
  #course-map {
    height: 380px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-card);
  }
  #course-map .leaflet-control-attribution {
    background: rgba(12, 13, 16, 0.8); color: var(--text-muted);
  }
  #course-map .leaflet-control-attribution a { color: var(--text-dim); }
  .aid-marker-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .course-elev {
    width: 100%; height: auto; display: block; margin-top: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px;
  }
  .course-elev .elev-area { fill: rgba(255, 107, 61, 0.16); stroke: none; }
  .course-elev .elev-line { fill: none; stroke: #ff6b3d; stroke-width: 1.6; }
  .course-elev .elev-aid-line { stroke-dasharray: 3 3; }
  .course-elev .elev-grid { stroke: var(--border); stroke-width: 1; }
  .course-elev .elev-axis-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    fill: var(--text-muted);
  }
  .course-elev .elev-axis-unit {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    fill: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .course-elev .elev-aid-dot { cursor: pointer; }
  .course-elev .elev-popup-bg { fill: rgba(12, 13, 16, 0.94); stroke: var(--border-bright); }
  .course-elev .elev-popup-text {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: var(--text);
  }
  .course-elev .elev-runner-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
  }
  /* Predicted runner position dots (map + elevation profile) */
  .runner-dot { animation: runnerPulse 2s ease-in-out infinite; }
  @keyframes runnerPulse {
    0%, 100% { stroke-opacity: 1; }
    50% { stroke-opacity: 0.35; }
  }
  .leaflet-tooltip.runner-dot-label {
    background: rgba(12, 13, 16, 0.85); border: none; box-shadow: none;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }
  .leaflet-tooltip.runner-dot-label::before { display: none; }
</style>
</head>
<body>

<header class="site">
  <div class="brand">
    <div class="brand-meta">
      <span class="pulse"></span>
      <span id="brand-subtitle">Live</span>
      <span>·</span>
      <a href="index.html" style="color: var(--accent); text-decoration: none;">← Hub</a>
    </div>
    <h1 class="site" id="race-title">Loading…</h1>
  </div>
  <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
    <div class="race-clock">
      <span class="label" id="elapsed-label">Race Time Elapsed</span>
      <span class="time" id="elapsed">--:--:--</span>
    </div>
    <a class="nav-link" id="lk-pit" href="#" style="display:none;">Pit →</a>
    <a class="nav-link" id="lk-charts" href="#">Charts →</a>
    <a class="nav-link" id="lk-print" href="#">Print →</a>
  </div>
</header>

<div id="error" class="error-banner" style="display:none;"></div>
<div id="share-banner" class="share-banner" style="display:none;"></div>
<div id="cutoffs" class="cutoffs" style="display:none;"></div>
<section id="access" class="access" style="display:none;">
  <div class="access-head">
    <span class="access-head-title">Manage access</span>
    <span class="access-head-toggle">Expand</span>
  </div>
  <div class="access-body" id="access-body"></div>
</section>
<section id="runners" class="runners"></section>

<section id="course-map-section" style="display:none;">
  <div class="course-map-head">
    <span class="course-map-title">Course</span>
    <span class="course-map-meta" id="course-map-meta"></span>
  </div>
  <div id="course-map"></div>
  <svg id="course-elev" class="course-elev" viewBox="0 0 1000 200"></svg>
</section>

<footer class="site">
  <div class="legend">
    <span class="legend-item"><span class="swatch" style="background: var(--green);"></span>On pace</span>
    <span class="legend-item"><span class="swatch" style="background: var(--yellow);"></span>Tight</span>
    <span class="legend-item"><span class="swatch" style="background: var(--red);"></span>Off pace</span>
    <span class="legend-item"><span class="swatch" style="background: var(--accent);"></span>Live</span>
  </div>
  <div id="last-updated">—</div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="lib/race-core.js?v=13"></script>
<script>
  const REFRESH_MS = 10000;
  const slug = Race.qs('id');
  if (!slug) { window.location = 'index.html'; }

  // Update nav links to carry the slug
  document.getElementById('lk-pit').href    = `pit.html?id=${encodeURIComponent(slug)}`;
  document.getElementById('lk-charts').href = `charts.html?id=${encodeURIComponent(slug)}`;
  document.getElementById('lk-print').href  = `print-report.html?id=${encodeURIComponent(slug)}`;

  let cfg = null, data = null;
  let lastFetchAt = null;
  const LEGLOG_KEY = `race-${slug}-leglog-collapsed-v1`;

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function intakeClass(actual, target) {
    if (target === 0) return 'good';
    const ratio = actual / target;
    if (ratio >= 0.85) return 'good';
    if (ratio >= 0.65) return 'warn';
    return 'low';
  }

  function statusLabel(s) {
    return { onpace: 'On Pace', tight: 'Tight', offpace: 'Off Pace', notstarted: 'Not Started', finished: 'Finished' }[s] || s;
  }

  // A loop with no aid stations — rendered as the lap grid rather than rows.
  function isSimpleLoop() {
    return cfg && cfg.courseType === 'loops' && !((cfg.course && cfg.course.loopSegments) || []).length;
  }

  function loopCellClass(durationSec, status) {
    if (durationSec == null) return '';
    if (status === 'onpace' || status === 'finished') return 'done';
    // Without per-loop reference, fall back to runner overall status.
    if (status === 'tight') return 'slow';
    if (status === 'offpace') return 'danger';
    return 'done';
  }

  function renderCutoffs() {
    const start = new Date(cfg.startTime);
    const cuts = cfg.cutoffs || {};
    const final = new Date(start.getTime() + (cuts.totalHours || 0) * 3600 * 1000);
    const day = d => d.toDateString() === start.toDateString() ? '' : ' D2';
    const fmt = d => d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) + day(d);
    const tightHtml = cuts.lastLegStartHours
      ? `<div class="cutoff-item warn"><span class="v">${fmt(new Date(start.getTime() + cuts.lastLegStartHours * 3600 * 1000))}</span><span class="l">Last leg start · ${cuts.lastLegStartHours}h</span></div>`
      : '';
    document.getElementById('cutoffs').style.display = '';
    document.getElementById('cutoffs').innerHTML = `
      <span class="cutoffs-label">Cutoffs</span>
      <div></div>
      <div class="cutoff-item"><span class="v">${fmt(start)}</span><span class="l">Start</span></div>
      ${tightHtml}
      <div class="cutoff-item danger"><span class="v">${fmt(final)}</span><span class="l">Final · ${cuts.totalHours}h</span></div>
    `;
  }

  function loopLegCells(runner, c) {
    const totalLoops = cfg.course?.loopCount || 0;
    return Array.from({ length: totalLoops }, (_, i) => {
      const idx1 = i + 1;
      const dur = c.legDurations[i];
      const isCurrent = idx1 === c.legsDone + 1 && c.status !== 'notstarted' && c.legsDone < totalLoops;
      let cls = '';
      if (dur != null) cls = loopCellClass(dur, c.status);
      if (isCurrent) cls = 'current';
      const text = dur != null
        ? Race.fmt.durationShort(dur)
        : (isCurrent ? '···' : '—');
      return `<div class="leg-cell ${cls}"><span class="n">L${idx1}</span><span class="t">${text}</span></div>`;
    }).join('');
  }

  function segmentRows(runner, c) {
    const segs = Race.course.legs(cfg);
    return segs.map((s, i) => {
      const entry = (runner.legs || []).find(l => l.index === s.index);
      const dur = entry && entry.startTime && entry.endTime
        ? (new Date(entry.endTime) - new Date(entry.startTime)) / 1000 : null;
      const isCurrent = entry && entry.startTime && !entry.endTime;
      const isDone = dur != null;
      let cls = '';
      if (isDone) cls = 'done';
      if (isCurrent) cls = 'current';
      const cutoffText = s.arriveCutoffHours != null
        ? Race.fmt.hoursToHm(s.arriveCutoffHours) : '—';
      // Pit time after this segment: a finished gap, or the live pit if the
      // runner is in the pit after this leg right now.
      const nextEntry = (runner.legs || []).find(l => l.index === s.index + 1);
      const pitDone = entry && entry.endTime && nextEntry && nextEntry.startTime
        ? (new Date(nextEntry.startTime) - new Date(entry.endTime)) / 1000 : null;
      const pitLive = entry && entry.endTime && c.inPit && c.liveLegIndex === s.index;

      // Current-leg duration ticks every second via the .live-timer class.
      const durCell = isCurrent
        ? `<span class="col-dur live-timer" data-base="0" data-since="${entry.startTime}" data-fmt="short">${Race.fmt.durationShort(c.currentLegSeconds)}</span>`
        : `<span class="col-dur">${isDone ? Race.fmt.durationShort(dur) : '—'}</span>`;

      let pitCell = '<span class="col-pit"></span>';
      if (pitLive) {
        pitCell = `<span class="col-pit"><span class="live-timer" data-base="0" data-since="${entry.endTime}" data-fmt="short">${Race.fmt.durationShort(c.currentPitSeconds)}</span> pit</span>`;
      } else if (pitDone != null) {
        pitCell = `<span class="col-pit">${Race.fmt.durationShort(pitDone)} pit</span>`;
      }

      return `
        <div class="seg-row ${cls}">
          <span class="num">${s.index}</span>
          <span class="nm">
            ${escapeHtml(s.name)}
            <div class="meta">${s.distanceMi.toFixed(1)} mi · ${s.cumulativeMi.toFixed(1)} mi total${s.elevationGainFt != null ? ` · +${s.elevationGainFt}/${-Math.abs(s.elevationLossFt || 0)} ft` : ''}</div>
          </span>
          ${durCell}
          <span class="col-cut">${cutoffText}</span>
          ${pitCell}
        </div>`;
    }).join('');
  }

  function legLog(runner, c) {
    if (!runner.legs || runner.legs.length === 0) {
      return `<tr class="empty"><td colspan="7">Awaiting first leg</td></tr>`;
    }
    return runner.legs.slice().sort((a, b) => a.index - b.index).map((l, i, arr) => {
      const segDef = Race.course.legAt(cfg, l.index);
      const dur = (l.startTime && l.endTime)
        ? (new Date(l.endTime) - new Date(l.startTime)) / 1000 : null;
      const next = arr[i + 1];
      let pitSec = null;
      if (l.endTime && next && next.startTime) {
        pitSec = (new Date(next.startTime) - new Date(l.endTime)) / 1000;
      } else if (l.endTime && !next && c.inPit && i === arr.length - 1) {
        pitSec = c.currentPitSeconds;
      }
      const pitCell = pitSec != null
        ? Race.fmt.durationShort(pitSec) + (next ? '' : ' <span style="color: var(--accent); font-size: 9px;">●</span>')
        : '—';
      const noteParts = [l.gearChanges, l.meds, l.issues, l.notes].filter(Boolean);
      const isOld = (arr.length - 1 - i) >= 2;
      const oldCls = isOld ? ' leg-old' : '';
      const noteOldCls = isOld ? ' note-old' : '';
      const noteRow = noteParts.length
        ? `<tr class="note-row${noteOldCls}"><td colspan="7">${escapeHtml(noteParts.join(' · '))}</td></tr>`
        : '';
      // Show the leg name for segments and loops-with-aids; a simple
      // lap-only loop just shows the index.
      const showName = segDef && segDef.name && !isSimpleLoop();
      const legLabel = showName
        ? `${l.index} <span style="color: var(--text-muted); font-size: 10px; display: block;">${escapeHtml(segDef.name)}</span>` : l.index;
      return `
        <tr class="leg-row${oldCls}">
          <td class="leg-num">${legLabel}</td>
          <td class="num">${Race.fmt.clockTime(l.endTime)}</td>
          <td class="num">${dur ? Race.fmt.durationShort(dur) : '—'}</td>
          <td class="num">${pitCell}</td>
          <td class="num">${l.calories || 0}</td>
          <td class="num">${l.fluidOz || 0}oz</td>
          <td class="num">${l.sodiumMg || 0}</td>
        </tr>
        ${noteRow}`;
    }).join('');
  }

  function loadLeglogState() {
    try { return JSON.parse(localStorage.getItem(LEGLOG_KEY) || '{}'); }
    catch (e) { return {}; }
  }
  function saveLeglogState(s) { try { localStorage.setItem(LEGLOG_KEY, JSON.stringify(s)); } catch (e) {} }
  function leglogCollapsed(runnerId, count) {
    if (count <= 2) return false;
    const s = loadLeglogState();
    return s[runnerId] !== false;
  }

  function renderRunner(runner) {
    const c = Race.compute.runner(runner, cfg);
    const t = cfg.targets || {};
    const color = runner.color || 'var(--accent)';
    const totalDist = c.courseDist;
    const totalCutSec = (cfg.cutoffs?.totalHours || 0) * 3600;

    // A loop with aid stations expands into per-segment legs, so it renders
    // like a segments course (each row already names its lap). Only a simple
    // lap-only loop uses the lap grid.
    const legsBlock = isSimpleLoop()
      ? `<div class="legs-grid">${loopLegCells(runner, c)}</div>`
      : `<div class="seg-list">${segmentRows(runner, c)}</div>`;

    const legUnit = isSimpleLoop() ? 'Laps' : (cfg.courseType === 'segments' ? 'Segments' : 'Legs');

    return `
      <article class="runner" style="--runner-color: ${color};">
        <div class="runner-head">
          <div>
            <div class="runner-name">${escapeHtml(runner.name)}</div>
            <div class="runner-bib">${escapeHtml(runner.bib || '')}</div>
          </div>
          <span class="status-badge status-${c.status}">${statusLabel(c.status)}</span>
        </div>

        <div class="stats">
          <div class="stat">
            <span class="label">${legUnit}</span>
            <span class="value">${c.legsDone}<span style="color: var(--text-muted); font-size: 14px;">/${c.totalLegs}</span></span>
            <span class="sub">${c.milesDone.toFixed(1)} / ${totalDist.toFixed(1)} mi</span>
          </div>
          <div class="stat">
            <span class="label">Race Time</span>
            <span class="value live-timer" data-base="${c.completedRaceSec}" data-since="${c.liveSince || ''}">${Race.fmt.duration(c.raceSec)}</span>
            <span class="sub">of ${Race.fmt.hoursToHm(cfg.cutoffs?.totalHours)}</span>
          </div>
          <div class="stat${c.inProgressLeg ? ' live' : ''}">
            <span class="label">Course Total</span>
            <span class="value live-timer" data-base="${c.completedCourseSec}" data-since="${c.inProgressLeg ? (c.liveSince || '') : ''}">${Race.fmt.duration(c.totalCourseSec)}</span>
            <span class="sub">${c.inProgressLeg ? 'on course' : 'running total'}</span>
          </div>
          <div class="stat${c.inPit ? ' live' : ''}">
            <span class="label">Pit Total</span>
            <span class="value live-timer" data-base="${c.completedPitSec}" data-since="${c.inPit ? (c.liveSince || '') : ''}">${Race.fmt.duration(c.totalPitSec)}</span>
            <span class="sub">${c.inPit ? 'in pit now' : (c.avgPitSec != null ? 'avg ' + Race.fmt.duration(c.avgPitSec) : 'no pit yet')}</span>
          </div>
          ${(() => {
            let liveCls = '', liveValue = '—', liveSub;
            if (c.inProgressLeg) {
              liveCls = ' live-course';
              liveValue = Race.fmt.duration(c.currentLegSeconds);
              const segDef = Race.course.legAt(cfg, c.liveLegIndex);
              liveSub = cfg.courseType === 'segments'
                ? `${segDef ? segDef.name : 'Leg ' + c.liveLegIndex}`
                : `Lap ${c.liveLegIndex} on course`;
            } else if (c.inPit) {
              liveCls = ' live-pit';
              liveValue = Race.fmt.duration(c.currentPitSeconds);
              const segDef = Race.course.legAt(cfg, c.liveLegIndex);
              liveSub = cfg.courseType === 'segments'
                ? `at ${segDef && segDef.toAid ? segDef.toAid : 'aid'}`
                : `In pit · after lap ${c.liveLegIndex}`;
            } else if (c.legsDone >= c.totalLegs && c.legsDone > 0) {
              liveSub = 'finished';
            } else {
              liveSub = c.legsDone === 0 ? 'not started' : 'idle';
            }
            return `
              <div class="stat${liveCls}">
                <span class="label">Live</span>
                <span class="value live-timer" data-base="0" data-since="${c.liveSince || ''}">${liveValue}</span>
                <span class="sub">${liveSub}</span>
              </div>`;
          })()}
          <div class="stat">
            <span class="label">Pace</span>
            <span class="value">${Race.fmt.pace(c.paceSecPerMile)}</span>
            <span class="sub">min / mi</span>
          </div>
          <div class="stat">
            <span class="label">Avg Leg</span>
            <span class="value">${Race.fmt.duration(c.avgLegSec)}</span>
            <span class="sub">last: ${Race.fmt.duration(c.lastLegSec)}</span>
          </div>
          <div class="stat">
            <span class="label">Projected</span>
            <span class="value">${Race.fmt.duration(c.projectedFinishSec)}</span>
            <span class="sub">${c.projectedFinishSec && totalCutSec ? (c.projectedFinishSec > totalCutSec ? 'over cutoff' : 'under cutoff') : '—'}</span>
          </div>
        </div>

        ${(t.caloriesPerHour || t.fluidOzPerHour || t.sodiumMgPerHour) ? `
        <div class="intake">
          <div class="intake-title">Intake / Hour</div>
          ${t.caloriesPerHour ? `
            <div class="intake-row">
              <span class="name">Calories</span>
              <div class="bar-track"><div class="bar-fill ${intakeClass(c.calPerHr, t.caloriesPerHour)}" style="width: ${Math.min(100, (c.calPerHr / t.caloriesPerHour) * 100)}%"></div></div>
              <span class="num">${Math.round(c.calPerHr)}</span>
              <span class="target">/ ${t.caloriesPerHour}</span>
            </div>` : ''}
          ${t.fluidOzPerHour ? `
            <div class="intake-row">
              <span class="name">Fluid</span>
              <div class="bar-track"><div class="bar-fill ${intakeClass(c.fluidPerHr, t.fluidOzPerHour)}" style="width: ${Math.min(100, (c.fluidPerHr / t.fluidOzPerHour) * 100)}%"></div></div>
              <span class="num">${c.fluidPerHr.toFixed(1)} oz</span>
              <span class="target">/ ${t.fluidOzPerHour} oz</span>
            </div>` : ''}
          ${t.sodiumMgPerHour ? `
            <div class="intake-row">
              <span class="name">Sodium</span>
              <div class="bar-track"><div class="bar-fill ${intakeClass(c.sodiumPerHr, t.sodiumMgPerHour)}" style="width: ${Math.min(100, (c.sodiumPerHr / t.sodiumMgPerHour) * 100)}%"></div></div>
              <span class="num">${Math.round(c.sodiumPerHr)} mg</span>
              <span class="target">/ ${t.sodiumMgPerHour} mg</span>
            </div>` : ''}
        </div>` : ''}

        <div class="legs-section">
          <div class="legs-head">
            <span class="legs-title">${cfg.courseType === 'loops' ? 'Lap Status' : 'Segments'}</span>
            <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);">
              ${c.legsDone} done · ${c.totalLegs - c.legsDone} to go
            </span>
          </div>
          ${legsBlock}
          <div class="leglog ${leglogCollapsed(runner.id, (runner.legs || []).length) ? 'collapsed' : ''}" data-runner="${runner.id}">
            ${(runner.legs || []).length > 2 ? `
              <div class="leglog-head" data-action="toggle-leglog" data-runner="${runner.id}">
                <span class="leglog-head-title">Leg Log</span>
                <span class="leglog-toggle">
                  <span class="when-collapsed">Show all ${runner.legs.length}</span>
                  <span class="when-expanded">Show recent 2</span>
                </span>
              </div>
            ` : ''}
            <table>
              <thead>
                <tr>
                  <th>#</th><th>Done</th><th class="num">Leg</th><th class="num">Pit</th>
                  <th class="num">Cal</th><th class="num">Fluid</th><th class="num">Na</th>
                </tr>
              </thead>
              <tbody>${legLog(runner, c)}</tbody>
            </table>
          </div>
        </div>
      </article>
    `;
  }

  function tick() {
    if (!cfg) return;
    const now = new Date();
    const start = new Date(cfg.startTime);
    const cutoffSec = (cfg.cutoffs?.totalHours || 0) * 3600;
    let diff = Math.floor((now - start) / 1000);
    const el = document.getElementById('elapsed');
    const label = document.getElementById('elapsed-label');
    if (diff < 0) {
      // Race hasn't started — count down to the gun.
      if (label) label.textContent = 'Race Starts In';
      el.textContent = Race.fmt.duration(-diff);
      el.style.color = 'var(--text-muted)';
    } else {
      if (label) label.textContent = 'Race Time Elapsed';
      const capped = Math.min(diff, cutoffSec || diff);
      el.textContent = Race.fmt.duration(capped);
      el.style.color = (cutoffSec && capped >= cutoffSec) ? 'var(--red)' : 'var(--text)';
    }
    document.querySelectorAll('.live-timer').forEach(t => {
      const since = t.dataset.since;
      if (!since) return;
      const base = parseFloat(t.dataset.base) || 0;
      const seconds = base + Math.max(0, (Date.now() - new Date(since).getTime()) / 1000);
      t.textContent = t.dataset.fmt === 'short'
        ? Race.fmt.durationShort(seconds)
        : Race.fmt.duration(seconds);
    });
    // Advance the predicted runner positions every second too.
    updateTracking();
  }

  async function load() {
    try {
      // Stash any ?t=<share-token> for use by the worker reads (currently
      // share-link viewers read direct from Pages since the data is public;
      // when we move to private-backend storage this becomes mandatory).
      Race.share.captureFromUrl();

      // config rarely changes — Pages is fine. data.json is the live file:
      // signed-in crew read it through the worker so a pit press shows up
      // within a poll instead of waiting on the Pages rebuild.
      cfg  = await Race.gh.readRaceJson(slug, 'config.json');
      data = await Race.gh.readRaceJson(slug, 'data.json', true);
      lastFetchAt = new Date();

      document.title = `${cfg.name} · Live`;
      document.getElementById('race-title').innerHTML =
        cfg.name.replace(/(\w+)$/, '<em>$1</em>');
      document.getElementById('brand-subtitle').textContent =
        cfg.location || (cfg.courseType === 'loops' ? 'Loops' : 'Point-to-point');

      renderCutoffs();

      const runnersById = new Map((cfg.runners || []).map(r => [r.id, r]));
      const merged = (data.runners || []).map(d => {
        const meta = runnersById.get(d.id) || {};
        return { ...meta, ...d };
      });
      // Include configured runners who don't have entries yet
      (cfg.runners || []).forEach(r => {
        if (!merged.find(m => m.id === r.id)) merged.push({ ...r, legs: [] });
      });

      const container = document.getElementById('runners');
      container.classList.toggle('single', merged.length === 1);
      container.innerHTML = merged.map(renderRunner).join('');
      mergedRunners = merged;

      document.getElementById('error').style.display = 'none';
      renderShareBanner();
      maybeShowAccessPanel();
      document.getElementById('lk-pit').style.display = canEdit() ? '' : 'none';
      updateLastUpdated();
      tick();
      initCourseVisuals();
      updateTracking();
    } catch (err) {
      const e = document.getElementById('error');
      e.style.display = 'block';
      e.textContent = `Error loading race: ${err.message}`;
    }
  }

  // ---------- course visuals (Leaflet map + elevation profile) ----------
  // The route, aid markers and elevation profile are built once from
  // course.gpx. Predicted runner positions are refreshed on every load.
  const AID_END_COLOR = '#6ee7a8';
  const AID_MID_COLOR = '#ff6b3d';
  let courseVisualsReady = false;
  let courseMap = null, courseGpxPts = null;
  let mapRunnerMarkers = {};               // runnerId -> Leaflet marker
  let elevX = null, elevY = null;          // elevation-SVG scale fns
  let mergedRunners = [];                  // set by load()

  // The GPX point nearest a given cumulative mileage.
  function nearestGpxPoint(pts, mi) {
    let best = pts[0], bestDiff = Infinity;
    for (const p of pts) {
      const diff = Math.abs((p.dist || 0) - mi);
      if (diff < bestDiff) { bestDiff = diff; best = p; }
    }
    return best;
  }

  async function initCourseVisuals() {
    if (courseVisualsReady) return;

    let gpxText;
    try {
      const res = await fetch(`races/${encodeURIComponent(slug)}/course.gpx?_=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) return; // no GPX for this race (or Pages not republished yet)
      gpxText = await res.text();
    } catch (e) { return; }

    let pts;
    try { pts = Race.gpx.parse(gpxText); } catch (e) { return; }
    if (!pts.length) return;

    courseGpxPts = pts;
    courseVisualsReady = true;
    document.getElementById('course-map-section').style.display = '';
    const aids = Race.course.aidStations(cfg);

    const dist = Race.gpx.totalDistanceMi(pts);
    const elev = Race.gpx.totalElevation(pts);
    document.getElementById('course-map-meta').textContent =
      `${dist.toFixed(1)} mi · +${elev.gainFt.toLocaleString()} / -${elev.lossFt.toLocaleString()} ft`;

    // Elevation profile — pure SVG, so it renders even if Leaflet didn't load.
    try { renderElevationProfile(pts, aids); } catch (e) {}

    // Leaflet map — skipped gracefully if the library is unavailable.
    if (typeof L !== 'undefined') {
      courseMap = L.map('course-map', { scrollWheelZoom: false });
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd', maxZoom: 19
      }).addTo(courseMap);

      const line = L.polyline(pts.map(p => [p.lat, p.lon]), { color: AID_MID_COLOR, weight: 3, opacity: 0.9 }).addTo(courseMap);
      courseMap.fitBounds(line.getBounds(), { padding: [24, 24] });

      aids.forEach((aid, i) => {
        const p = nearestGpxPoint(pts, aid.mileage);
        const isEnd = i === 0 || i === aids.length - 1;
        L.circleMarker([p.lat, p.lon], {
          radius: isEnd ? 6 : 5, color: '#fff', weight: 2,
          fillColor: isEnd ? AID_END_COLOR : AID_MID_COLOR, fillOpacity: 1
        }).addTo(courseMap).bindTooltip(
          `${aid.name} · ${aid.mileage.toFixed(1)} mi`,
          { className: 'aid-marker-label', direction: 'top' }
        );
      });

    } else {
      document.getElementById('course-map').style.display = 'none';
    }

    updateTracking();
  }

  // Elevation vs. distance SVG, with the same aid-station markers as the map.
  // A trailing <g id="elev-runners"> is left empty for updateTracking().
  function renderElevationProfile(pts, aids) {
    const svg = document.getElementById('course-elev');
    const W = 1000, H = 200, padL = 48, padR = 8, padT = 20, padB = 14;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const totalMi = pts[pts.length - 1].dist || 1;
    let minE = Infinity, maxE = -Infinity;
    for (const p of pts) {
      if (p.ele < minE) minE = p.ele;
      if (p.ele > maxE) maxE = p.ele;
    }
    if (maxE - minE < 1) maxE = minE + 1;
    const x = mi => padL + (Math.min(mi, totalMi) / totalMi) * plotW;
    const y = ele => padT + (1 - (ele - minE) / (maxE - minE)) * plotH;
    const baseY = padT + plotH;
    elevX = x; elevY = y;

    // Elevation scale — gridlines + feet labels down the left edge.
    let scale = `<text class="elev-axis-unit" x="${padL - 6}" y="11" text-anchor="end">ft</text>`;
    const yTicks = 4;
    for (let i = 0; i <= yTicks; i++) {
      const ele = minE + (i / yTicks) * (maxE - minE);
      const yy = y(ele).toFixed(1);
      const ft = Math.round(Race.gpx.metersToFeet(ele));
      scale += `<line class="elev-grid" x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" />` +
        `<text class="elev-axis-label" x="${padL - 6}" y="${yy}" text-anchor="end" dominant-baseline="middle">${ft.toLocaleString()}</text>`;
    }

    const linePts = pts.map(p => `${x(p.dist).toFixed(1)},${y(p.ele).toFixed(1)}`);
    const linePath = 'M' + linePts.join(' L');
    const areaPath = `M${x(0).toFixed(1)},${baseY.toFixed(1)} L${linePts.join(' L')} L${x(totalMi).toFixed(1)},${baseY.toFixed(1)} Z`;

    // Aid markers — a dot per aid; the name shows on hover (<title>) or tap.
    const marks = aids.map((aid, i) => {
      const ax = x(aid.mileage);
      const pt = nearestGpxPoint(pts, aid.mileage);
      const ay = y(pt.ele);
      const isEnd = i === 0 || i === aids.length - 1;
      const color = isEnd ? AID_END_COLOR : AID_MID_COLOR;
      const ft = Math.round(Race.gpx.metersToFeet(pt.ele));
      const label = `${aid.name} · ${aid.mileage.toFixed(1)} mi`;
      return `
        <line class="elev-aid-line" x1="${ax.toFixed(1)}" y1="${padT}" x2="${ax.toFixed(1)}" y2="${baseY.toFixed(1)}"
              stroke="${color}" stroke-opacity="0.3" />
        <circle class="elev-aid-dot" cx="${ax.toFixed(1)}" cy="${ay.toFixed(1)}" r="5"
                fill="${color}" stroke="#0c0d10" stroke-width="1.5" data-label="${escapeHtml(label)}">
          <title>${escapeHtml(label)} · ${ft.toLocaleString()} ft</title>
        </circle>`;
    }).join('');

    svg.innerHTML = `
      ${scale}
      <path class="elev-area" d="${areaPath}" />
      <path class="elev-line" d="${linePath}" />
      ${marks}
      <g id="elev-aid-popup"></g>
      <g id="elev-runners"></g>`;

    // Tap an aid dot to show its name (in addition to the hover <title>).
    const popup = svg.querySelector('#elev-aid-popup');
    svg.addEventListener('click', (e) => {
      const dot = e.target.closest('.elev-aid-dot');
      if (!dot) { popup.innerHTML = ''; return; }
      const text = dot.getAttribute('data-label') || '';
      const cx = parseFloat(dot.getAttribute('cx'));
      const cy = parseFloat(dot.getAttribute('cy'));
      const h = 19, w = text.length * 6.3 + 16;
      let bx = Math.max(padL, Math.min(cx - w / 2, W - padR - w));
      let by = cy - h - 9;
      if (by < padT) by = cy + 9;
      popup.innerHTML =
        `<rect class="elev-popup-bg" x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${w.toFixed(1)}" height="${h}" rx="3" />` +
        `<text class="elev-popup-text" x="${(bx + w / 2).toFixed(1)}" y="${(by + h / 2 + 0.5).toFixed(1)}" text-anchor="middle" dominant-baseline="middle">${escapeHtml(text)}</text>`;
    });
  }

  // ---------- predictive runner tracking ----------
  // Position estimate comes from Race.compute.predictedMileage. Runners who
  // haven't started yet get no dot.
  function predictedPosition(runner) {
    const pos = Race.compute.predictedMileage(runner, cfg);
    return pos.state === 'idle' ? null : pos;
  }

  function trackingLabel(pos) {
    if (pos.state === 'finished') return 'finished';
    if (pos.state === 'in-pit') {
      return pos.atAid ? `in pit at ${pos.atAid}` : `in pit · ${pos.courseMi.toFixed(1)} mi`;
    }
    return `~${pos.courseMi.toFixed(1)} mi (est)`;
  }

  // Refreshes the predicted runner dots on the map and elevation profile.
  function updateTracking() {
    if (!courseVisualsReady || !courseGpxPts) return;
    const loopMode = cfg.courseType === 'loops';
    const loopDist = loopMode ? Race.course.loopDistance(cfg) : 0;
    // The GPX covers one lap for loops, the whole course for segments.
    const trackMi = courseMi =>
      (loopMode && loopDist > 0) ? (courseMi % loopDist) : courseMi;

    // Map — markers are moved in place (not cleared/re-added) so the
    // per-second updates don't flicker.
    if (courseMap) {
      const live = new Set();
      mergedRunners.forEach(r => {
        const pos = predictedPosition(r);
        if (!pos) return;
        live.add(r.id);
        const p = nearestGpxPoint(courseGpxPts, trackMi(pos.courseMi));
        const color = r.color || AID_MID_COLOR;
        const label = `${r.name} · ${trackingLabel(pos)}`;
        let m = mapRunnerMarkers[r.id];
        if (m) {
          m.setLatLng([p.lat, p.lon]);
          m.setStyle({ fillColor: color });
          m.setTooltipContent(label);
        } else {
          m = L.circleMarker([p.lat, p.lon], {
            radius: 7, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1,
            className: 'runner-dot'
          }).addTo(courseMap).bindTooltip(label, {
            permanent: true, direction: 'right', offset: [8, 0], className: 'runner-dot-label'
          });
          mapRunnerMarkers[r.id] = m;
        }
      });
      Object.keys(mapRunnerMarkers).forEach(id => {
        if (!live.has(id)) {
          courseMap.removeLayer(mapRunnerMarkers[id]);
          delete mapRunnerMarkers[id];
        }
      });
    }

    const g = document.getElementById('elev-runners');
    if (g && elevX && elevY) {
      g.innerHTML = mergedRunners.map(r => {
        const pos = predictedPosition(r);
        if (!pos) return '';
        const tmi = trackMi(pos.courseMi);
        const pt = nearestGpxPoint(courseGpxPts, tmi);
        const cx = elevX(tmi), cy = elevY(pt.ele);
        const color = r.color || AID_MID_COLOR;
        return `
          <circle class="runner-dot" cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="5"
                  fill="${color}" stroke="#0c0d10" stroke-width="1.5">
            <title>${escapeHtml(r.name)} · ${escapeHtml(trackingLabel(pos))}</title>
          </circle>
          <text class="elev-runner-label" x="${cx.toFixed(1)}" y="${(cy - 9).toFixed(1)}"
                text-anchor="middle" fill="${color}">${escapeHtml(r.name)}</text>`;
      }).join('');
    }
  }

  // ---------- share banner (anonymous shared view) ----------
  function renderShareBanner() {
    const banner = document.getElementById('share-banner');
    const tok = Race.share.get();
    if (tok && !Race.auth.has() && cfg.visibility === 'private') {
      banner.style.display = '';
      banner.innerHTML = `
        <span><span class="em">Shared view</span> · read-only via share link</span>
        <span style="color: var(--text-muted);">${escapeHtml(cfg.name || '')}</span>
      `;
    } else {
      banner.style.display = 'none';
    }
  }

  // ---------- manage access ----------
  function isProxyMode() { return Race.hub.isProxyMode(); }
  function currentEmail() { return Race.auth.email(); }
  function canManage() {
    if (!isProxyMode() || !Race.auth.has()) return false;
    const me = (currentEmail() || '').toLowerCase();
    if (!me) return false;
    if ((cfg.createdBy || '').toLowerCase() === me) return true;
    return (cfg.editors || []).some(e => (e || '').toLowerCase() === me);
  }

  // Edit access — gates the Pit link. In proxy mode it's the per-race ACL;
  // in direct/PAT mode it's whether this device has a token stored.
  function canEdit() {
    return isProxyMode() ? canManage() : Race.config.has();
  }

  let accessLoaded = false;
  function maybeShowAccessPanel() {
    const sec = document.getElementById('access');
    if (!canManage()) { sec.style.display = 'none'; return; }
    sec.style.display = '';
    if (!sec.dataset.wired) {
      sec.querySelector('.access-head').addEventListener('click', () => {
        sec.classList.toggle('open');
        if (sec.classList.contains('open') && !accessLoaded) loadAccess();
      });
      sec.dataset.wired = '1';
    }
  }

  let accessState = null;
  async function loadAccess() {
    const body = document.getElementById('access-body');
    body.innerHTML = `<div class="access-section"><div class="access-section-title">Loading…</div></div>`;
    try {
      accessState = await Race.api.accessList(slug);
      accessLoaded = true;
      renderAccess();
    } catch (err) {
      body.innerHTML = `<div class="access-err">Could not load access: ${escapeHtml(err.message)}</div>`;
    }
  }

  function renderAccess() {
    const s = accessState;
    if (!s) return;
    const me = (currentEmail() || '').toLowerCase();
    const editors = (s.editors || []);
    const viewers = (s.viewers || []);
    const editorsRow = (em, isCreator) => `
      <div class="row">
        <span class="who">${escapeHtml(em)}${em.toLowerCase() === me ? ' <span style="color: var(--text-muted);">(you)</span>' : ''}</span>
        <span class="tag ${isCreator ? 'creator' : 'editor'}">${isCreator ? 'Creator' : 'Editor'}</span>
        ${isCreator ? '<span></span>' : `<button data-revoke-editor="${escapeHtml(em)}">Revoke</button>`}
      </div>`;
    const viewerRow = (em) => `
      <div class="row">
        <span class="who">${escapeHtml(em)}</span>
        <span class="tag viewer">Viewer</span>
        <button data-revoke-viewer="${escapeHtml(em)}">Revoke</button>
      </div>`;

    const creator = s.createdBy ? [editorsRow(s.createdBy, true)] : [];
    const editorsHtml = creator.concat(
      editors
        .filter(em => (em || '').toLowerCase() !== (s.createdBy || '').toLowerCase())
        .map(em => editorsRow(em, false))
    ).join('') || `<div class="empty">No editors yet.</div>`;
    const viewersHtml = viewers.map(viewerRow).join('') || `<div class="empty">No invited viewers.</div>`;

    const shareLinksHtml = (s.shareLinks || []).length
      ? (s.shareLinks || []).map(sh => {
          const url = `${location.origin}${location.pathname.replace(/[^/]*$/, '')}race.html?id=${encodeURIComponent(slug)}&t=${encodeURIComponent(sh.token)}`;
          const exp = sh.expiresAt ? new Date(sh.expiresAt).toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' }) : 'no expiry';
          return `
            <div class="share-row">
              <div>
                <div class="lbl">View link · expires ${exp}</div>
                <div class="url">${escapeHtml(url)}</div>
              </div>
              <button class="copy" data-copy-share="${escapeHtml(url)}">Copy</button>
              <button class="revoke" data-revoke-share="${escapeHtml(sh.token)}">Revoke</button>
            </div>`;
        }).join('')
      : `<div class="empty">No share links yet.</div>`;

    const dir = location.pathname.replace(/[^/]*$/, '');
    const inviteUrl = token => `${location.origin}${dir}signup.html?invite=${encodeURIComponent(token)}`;
    const pendingHtml = (s.pendingInvites || []).length
      ? (s.pendingInvites || []).map(inv => {
          const exp = inv.expiresAt ? new Date(inv.expiresAt).toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' }) : 'no expiry';
          const url = inviteUrl(inv.token);
          return `
            <div class="share-row">
              <div>
                <div class="lbl">Invite for ${escapeHtml(inv.email)} (${escapeHtml(inv.role)}) · expires ${exp}</div>
                <div class="url">${escapeHtml(url)}</div>
              </div>
              <button class="copy" data-copy-share="${escapeHtml(url)}">Copy</button>
              <button class="revoke" data-revoke-invite="${escapeHtml(inv.token)}">Cancel</button>
            </div>`;
        }).join('')
      : '';

    const body = document.getElementById('access-body');
    body.innerHTML = `
      <div class="access-section">
        <div class="access-section-title">Editors</div>
        <div class="access-list">${editorsHtml}</div>
      </div>

      <div class="access-section">
        <div class="access-section-title">Viewers (private races only)</div>
        <div class="access-list">${viewersHtml}</div>
      </div>

      <div class="access-section">
        <div class="access-section-title">Invite someone</div>
        <div class="access-add">
          <input type="email" id="ax-email" placeholder="email@example.com" autocomplete="off" spellcheck="false" />
          <select id="ax-role">
            <option value="editor">Editor</option>
            <option value="viewer">Viewer</option>
          </select>
          <button class="btn primary" id="ax-invite">Generate invite link</button>
          <button class="btn" id="ax-add-existing">Add (already has account)</button>
        </div>
        <div class="access-help">
          <strong>Invite link</strong> — generates a one-time link you send to them; they pick a password and get access in one step.<br>
          <strong>Add (already has account)</strong> — adds them by email if they're already signed up. No notification is sent.
        </div>
        <div id="ax-invite-result"></div>
      </div>

      <div class="access-section">
        <div class="access-section-title">Share links (view without account)</div>
        <div class="access-list">${shareLinksHtml}</div>
        <div class="access-add">
          <button class="btn primary" id="ax-share">Generate view share link</button>
          <span style="color: var(--text-muted); font-size: 11px;">Default expiry: 30 days. Anyone with the link can view.</span>
        </div>
        <div id="ax-share-result"></div>
      </div>

      ${pendingHtml ? `
        <div class="access-section">
          <div class="access-section-title">Pending invites</div>
          <div class="access-list">${pendingHtml}</div>
        </div>
      ` : ''}
    `;

    wireAccessHandlers();
  }

  function wireAccessHandlers() {
    const body = document.getElementById('access-body');

    body.querySelectorAll('[data-revoke-editor]').forEach(b => {
      b.addEventListener('click', async () => {
        const email = b.dataset.revokeEditor;
        if (!confirm(`Revoke editor access for ${email}?`)) return;
        b.disabled = true; b.textContent = '…';
        try { await Race.api.accessRemove(slug, email); await loadAccess(); }
        catch (err) { alert('Could not revoke: ' + err.message); b.disabled = false; b.textContent = 'Revoke'; }
      });
    });
    body.querySelectorAll('[data-revoke-viewer]').forEach(b => {
      b.addEventListener('click', async () => {
        const email = b.dataset.revokeViewer;
        if (!confirm(`Revoke viewer access for ${email}?`)) return;
        b.disabled = true; b.textContent = '…';
        try { await Race.api.accessRemove(slug, email); await loadAccess(); }
        catch (err) { alert('Could not revoke: ' + err.message); b.disabled = false; b.textContent = 'Revoke'; }
      });
    });
    body.querySelectorAll('[data-copy-share]').forEach(b => {
      b.addEventListener('click', () => copyToClipboard(b.dataset.copyShare, b));
    });
    body.querySelectorAll('[data-revoke-share]').forEach(b => {
      b.addEventListener('click', async () => {
        if (!confirm('Revoke this share link?')) return;
        b.disabled = true; b.textContent = '…';
        try { await Race.api.shareRevoke(b.dataset.revokeShare); await loadAccess(); }
        catch (err) { alert('Could not revoke: ' + err.message); b.disabled = false; b.textContent = 'Revoke'; }
      });
    });
    body.querySelectorAll('[data-revoke-invite]').forEach(b => {
      b.addEventListener('click', async () => {
        if (!confirm('Cancel this pending invite? The link will stop working.')) return;
        b.disabled = true; b.textContent = '…';
        try { await Race.api.shareRevoke(b.dataset.revokeInvite); await loadAccess(); }
        catch (err) { alert('Could not cancel: ' + err.message); b.disabled = false; b.textContent = 'Cancel'; }
      });
    });

    const inviteBtn = body.querySelector('#ax-invite');
    if (inviteBtn) inviteBtn.addEventListener('click', async () => {
      const email = body.querySelector('#ax-email').value.trim();
      const role = body.querySelector('#ax-role').value;
      const out = body.querySelector('#ax-invite-result');
      if (!email) { out.innerHTML = `<div class="access-err">Email required.</div>`; return; }
      inviteBtn.disabled = true; inviteBtn.textContent = 'Generating…';
      try {
        const r = await Race.api.invite(slug, email, role);
        // Re-render the panel first (it shows the new pending invite), then
        // render the result box into the fresh node so it isn't wiped.
        await loadAccess();
        const out2 = document.getElementById('ax-invite-result');
        if (out2) {
          out2.innerHTML = `
            <div class="access-invite-result">
              <div>Send this link to <strong>${escapeHtml(email)}</strong>. They'll set a password and land on the race with ${escapeHtml(role)} access.</div>
              <span class="url">${escapeHtml(r.url)}</span>
              <button class="btn copy" data-copy-share="${escapeHtml(r.url)}">Copy link</button>
            </div>`;
          out2.querySelector('[data-copy-share]').addEventListener('click', (e) => copyToClipboard(r.url, e.currentTarget));
        }
      } catch (err) {
        out.innerHTML = `<div class="access-err">${escapeHtml(err.message)}</div>`;
        inviteBtn.disabled = false; inviteBtn.textContent = 'Generate invite link';
      }
    });

    const addExistingBtn = body.querySelector('#ax-add-existing');
    if (addExistingBtn) addExistingBtn.addEventListener('click', async () => {
      const email = body.querySelector('#ax-email').value.trim();
      const role = body.querySelector('#ax-role').value;
      const out = body.querySelector('#ax-invite-result');
      if (!email) { out.innerHTML = `<div class="access-err">Email required.</div>`; return; }
      addExistingBtn.disabled = true; addExistingBtn.textContent = 'Adding…';
      try {
        await Race.api.accessAdd(slug, email, role);
        await loadAccess();
        const out2 = document.getElementById('ax-invite-result');
        if (out2) out2.innerHTML = `<div class="access-invite-result">Added ${escapeHtml(email)} as ${escapeHtml(role)}. They'll see this race in their hub on next visit.</div>`;
      } catch (err) {
        out.innerHTML = `<div class="access-err">${escapeHtml(err.message)}</div>`;
        addExistingBtn.disabled = false; addExistingBtn.textContent = 'Add (already has account)';
      }
    });

    const shareBtn = body.querySelector('#ax-share');
    if (shareBtn) shareBtn.addEventListener('click', async () => {
      const out = body.querySelector('#ax-share-result');
      shareBtn.disabled = true; shareBtn.textContent = 'Generating…';
      try {
        const r = await Race.api.shareLink(slug, 'view');
        await loadAccess();
        const out2 = document.getElementById('ax-share-result');
        if (out2) {
          out2.innerHTML = `
            <div class="access-share-result">
              <div>Anyone with this link can view the live dashboard for the next 30 days. Revoke any time below.</div>
              <span class="url">${escapeHtml(r.url)}</span>
              <button class="btn copy" data-copy-share="${escapeHtml(r.url)}">Copy link</button>
            </div>`;
          out2.querySelector('[data-copy-share]').addEventListener('click', (e) => copyToClipboard(r.url, e.currentTarget));
        }
      } catch (err) {
        out.innerHTML = `<div class="access-err">${escapeHtml(err.message)}</div>`;
        shareBtn.disabled = false; shareBtn.textContent = 'Generate view share link';
      }
    });
  }

  function copyToClipboard(text, btn) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => flashBtn(btn, 'Copied ✓'),
        () => fallbackCopy(text, btn));
    } else {
      fallbackCopy(text, btn);
    }
  }
  function fallbackCopy(text, btn) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); flashBtn(btn, 'Copied ✓'); }
    catch (e) { flashBtn(btn, 'Copy failed'); }
    document.body.removeChild(ta);
  }
  function flashBtn(btn, label) {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = label;
    setTimeout(() => { btn.textContent = orig; }, 1200);
  }

  function updateLastUpdated() {
    if (!data) return;
    const lu = data.lastUpdated
      ? `Data updated ${new Date(data.lastUpdated).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`
      : 'Awaiting start';
    let live = '';
    if (lastFetchAt) {
      const ago = Math.max(0, Math.floor((Date.now() - lastFetchAt.getTime()) / 1000));
      live = ago < 5 ? ' · live' : ` · checked ${ago}s ago`;
    }
    document.getElementById('last-updated').textContent = lu + live;
  }

  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-action="toggle-leglog"]');
    if (!t) return;
    const id = t.dataset.runner;
    const log = t.closest('.leglog');
    if (!log) return;
    const nowCollapsed = !log.classList.contains('collapsed');
    log.classList.toggle('collapsed', nowCollapsed);
    const s = loadLeglogState();
    s[id] = nowCollapsed;
    saveLeglogState(s);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') load();
  });

  load();
  setInterval(tick, 1000);
  setInterval(updateLastUpdated, 1000);
  setInterval(load, REFRESH_MS);
</script>

</body>

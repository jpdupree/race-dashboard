<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Print Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/race-theme.css?v=2">
<style>
  /* Screen styles (reuse dashboard) */
  .controls {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
  }
  .cutoffs {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 4px; padding: 18px 24px; margin-bottom: 24px;
    display: grid; grid-template-columns: auto 1fr repeat(3, auto);
    gap: 28px; align-items: center;
  }
  .cutoffs-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
  }
  .cutoff-item { display: flex; flex-direction: column; gap: 2px; }
  .cutoff-item .v { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
  .cutoff-item .l { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .cutoff-item.warn .v { color: var(--yellow); }
  .cutoff-item.danger .v { color: var(--red); }

  .runner {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; margin-bottom: 24px;
    position: relative;
  }
  .runner::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--runner-color, var(--accent)), transparent);
  }
  .runner-head {
    padding: 22px 26px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .runner-name {
    font-family: 'Fraunces', serif; font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
  }
  .runner-bib { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .summary-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .summary-stat {
    padding: 16px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .summary-stat:last-child { border-right: none; }
  .summary-stat .l {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted);
  }
  .summary-stat .v {
    font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700;
  }
  .summary-stat .s { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  table.legs {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  table.legs th {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted);
    text-align: left; padding: 12px 10px 10px;
    border-bottom: 1px solid var(--border); font-weight: 500;
  }
  table.legs th.num, table.legs td.num { text-align: right; font-family: 'JetBrains Mono', monospace; }
  table.legs td {
    padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top;
  }
  table.legs tr:last-child td { border-bottom: none; }
  table.legs .leg-num {
    font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600;
    color: var(--accent); width: 30px;
  }
  table.legs tr.note td {
    border-top: none; border-bottom: 1px solid var(--border);
    padding-top: 0; color: var(--text-dim); font-size: 11px;
  }

  .course-block {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 22px 24px; margin-bottom: 24px;
  }
  .course-block h2 {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
    margin-bottom: 8px;
  }
  .course-stats {
    display: flex; gap: 20px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    margin-bottom: 16px;
  }
  .course-stats strong { color: var(--text); }
  .course-stats span { color: var(--text-dim); }
  svg.elevation {
    width: 100%; height: 200px; display: block;
  }

  @media print {
    @page { size: letter portrait; margin: 0.5in; }

    *, *::before, *::after {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      animation: none !important;
      transition: none !important;
    }
    html, body {
      background: white !important; background-image: none !important;
      color: #111 !important; font-size: 10pt;
    }
    body { padding: 0 !important; }
    .controls, .nav-link, .pulse, .brand-meta a { display: none !important; }
    header.site { padding-bottom: 10pt; margin-bottom: 12pt; border-bottom: 1px solid #999; }
    h1.site { color: #111 !important; font-size: 22pt; }
    h1.site em { color: #c44a18 !important; }

    .cutoffs {
      background: #f6f6f6 !important; border: 1px solid #bbb !important;
      page-break-inside: avoid;
    }
    .cutoff-item .v { color: #111 !important; }
    .cutoff-item.warn .v { color: #8a6700 !important; }
    .cutoff-item.danger .v { color: #a82626 !important; }

    .runner {
      background: white !important; border: 1px solid #999 !important;
      page-break-inside: avoid; margin-bottom: 14pt;
    }
    .runner::before { display: none; }
    .runner-name { color: #111 !important; }
    .runner-bib { color: #555 !important; }
    .summary-grid { border-bottom: 1px solid #ddd !important; }
    .summary-stat { border-right: 1px solid #ddd !important; }
    .summary-stat .l, .summary-stat .s { color: #555 !important; }
    .summary-stat .v { color: #111 !important; }

    table.legs th { color: #555 !important; border-bottom: 1px solid #999 !important; }
    table.legs td { border-bottom: 1px solid #eee !important; }
    table.legs tr.note td { color: #555 !important; }
    table.legs .leg-num { color: #c44a18 !important; }

    .course-block {
      background: white !important; border: 1px solid #999 !important;
      page-break-before: always;
    }
    .course-block h2 { color: #111 !important; }
    .course-stats span { color: #555 !important; }
    svg.elevation path.area { fill: rgba(196,74,24,0.18) !important; }
    svg.elevation path.line { stroke: #c44a18 !important; }

    footer.site { color: #555 !important; border-top: 1px solid #999 !important; }
  }
</style>
</head>
<body>

<header class="site">
  <div class="brand">
    <div class="brand-meta">
      <span>Race Report</span><span>·</span>
      <a href="#" id="back-link" style="color: inherit; text-decoration: none;">← Race</a>
    </div>
    <h1 class="site" id="race-title">Loading…</h1>
  </div>
  <div class="controls">
    <button class="btn primary" onclick="window.print()">Print</button>
  </div>
</header>

<div id="error" class="error-banner" style="display:none;"></div>
<div id="cutoffs" class="cutoffs" style="display:none;"></div>
<div id="runners"></div>
<div id="course-block" class="course-block" style="display:none;">
  <h2>Course</h2>
  <div class="course-stats" id="course-stats"></div>
  <svg class="elevation" id="elev-svg"></svg>
</div>

<footer class="site">
  <div id="meta">—</div>
  <div>Auto-generated · race-dashboard hub</div>
</footer>

<script src="lib/race-core.js?v=2"></script>
<script>
  const slug = Race.qs('id');
  if (!slug) { window.location = 'index.html'; }
  document.getElementById('back-link').href = `race.html?id=${encodeURIComponent(slug)}`;

  let cfg = null, data = null, gpxPts = null;

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderCutoffs() {
    const start = new Date(cfg.startTime);
    const cuts = cfg.cutoffs || {};
    const final = new Date(start.getTime() + (cuts.totalHours || 0) * 3600 * 1000);
    const fmt = d => d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    const tightHtml = cuts.lastLegStartHours
      ? `<div class="cutoff-item warn"><span class="v">${fmt(new Date(start.getTime() + cuts.lastLegStartHours * 3600 * 1000))}</span><span class="l">Last leg start · ${cuts.lastLegStartHours}h</span></div>` : '';
    document.getElementById('cutoffs').style.display = '';
    document.getElementById('cutoffs').innerHTML = `
      <span class="cutoffs-label">Cutoffs</span>
      <div></div>
      <div class="cutoff-item"><span class="v">${fmt(start)}</span><span class="l">Start</span></div>
      ${tightHtml}
      <div class="cutoff-item danger"><span class="v">${fmt(final)}</span><span class="l">Final · ${cuts.totalHours}h</span></div>
    `;
  }

  function renderRunner(runner) {
    const c = Race.compute.runner(runner, cfg);
    const color = runner.color || 'var(--accent)';
    const legRows = (runner.legs || []).slice().sort((a, b) => a.index - b.index).map((l, i, arr) => {
      const def = Race.course.legAt(cfg, l.index);
      const dur = (l.startTime && l.endTime)
        ? (new Date(l.endTime) - new Date(l.startTime)) / 1000 : null;
      const next = arr[i + 1];
      const pitSec = (l.endTime && next && next.startTime)
        ? (new Date(next.startTime) - new Date(l.endTime)) / 1000 : null;
      const noteParts = [l.gearChanges, l.meds, l.issues, l.notes].filter(Boolean);
      const noteRow = noteParts.length
        ? `<tr class="note"><td colspan="8">${escapeHtml(noteParts.join(' · '))}</td></tr>`
        : '';
      // Simple lap-only loops just show the index; segments and
      // loops-with-aids show the leg name beneath it.
      const showName = def && def.name && !(cfg.courseType === 'loops' && !(cfg.course.loopSegments || []).length);
      const legName = showName
        ? `<span style="font-size: 10px; color: var(--text-muted); display: block;">${escapeHtml(def.name)}</span>`
        : '';
      return `
        <tr>
          <td class="leg-num">${l.index}${legName}</td>
          <td class="num">${Race.fmt.clockTimeSec(l.startTime)}</td>
          <td class="num">${Race.fmt.clockTimeSec(l.endTime)}</td>
          <td class="num">${dur ? Race.fmt.durationShort(dur) : '—'}</td>
          <td class="num">${pitSec != null ? Race.fmt.durationShort(pitSec) : '—'}</td>
          <td class="num">${l.calories || 0}</td>
          <td class="num">${l.fluidOz || 0}oz</td>
          <td class="num">${l.sodiumMg || 0}</td>
        </tr>
        ${noteRow}`;
    }).join('');

    return `
      <article class="runner" style="--runner-color: ${color};">
        <div class="runner-head">
          <div>
            <div class="runner-name">${escapeHtml(runner.name)}</div>
            <div class="runner-bib">${escapeHtml(runner.bib || '')}</div>
          </div>
          <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em;">
            ${c.legsDone}/${c.totalLegs} ${cfg.courseType === 'loops' && !(cfg.course.loopSegments || []).length ? 'laps' : 'legs'} · ${c.milesDone.toFixed(1)} mi
          </div>
        </div>
        <div class="summary-grid">
          <div class="summary-stat"><span class="l">Race Time</span><span class="v">${Race.fmt.duration(c.raceSec)}</span><span class="s">of ${Race.fmt.hoursToHm(cfg.cutoffs?.totalHours)}</span></div>
          <div class="summary-stat"><span class="l">Course</span><span class="v">${Race.fmt.duration(c.completedCourseSec)}</span><span class="s">avg leg ${Race.fmt.duration(c.avgLegSec)}</span></div>
          <div class="summary-stat"><span class="l">Pit / Aid</span><span class="v">${Race.fmt.duration(c.completedPitSec)}</span><span class="s">avg ${Race.fmt.duration(c.avgPitSec)}</span></div>
          <div class="summary-stat"><span class="l">Pace</span><span class="v">${Race.fmt.pace(c.paceSecPerMile)}</span><span class="s">${c.totalCal.toLocaleString()} cal · ${c.totalFluid} oz · ${(c.totalSodium/1000).toFixed(1)} g Na</span></div>
        </div>
        <table class="legs">
          <thead>
            <tr>
              <th>#</th>
              <th class="num">Out</th>
              <th class="num">In</th>
              <th class="num">Leg</th>
              <th class="num">Aid</th>
              <th class="num">Cal</th>
              <th class="num">Fluid</th>
              <th class="num">Na</th>
            </tr>
          </thead>
          <tbody>${legRows || `<tr><td colspan="8" style="text-align:center; padding:24px; color: var(--text-muted); font-style: italic;">No legs yet</td></tr>`}</tbody>
        </table>
      </article>`;
  }

  function renderCourseBlock() {
    if (!gpxPts || !gpxPts.length) return;
    document.getElementById('course-block').style.display = '';

    const total = Race.gpx.totalDistanceMi(gpxPts);
    const elev = Race.gpx.totalElevation(gpxPts);
    document.getElementById('course-stats').innerHTML = `
      <div><strong>${total.toFixed(1)} mi</strong> <span>total</span></div>
      <div><strong>+${elev.gainFt.toLocaleString()} ft</strong> <span>gain</span></div>
      <div><strong>-${elev.lossFt.toLocaleString()} ft</strong> <span>loss</span></div>
      <div><strong>${cfg.courseType === 'loops'
        ? cfg.course.loopCount + ' × loop' + ((cfg.course.loopSegments || []).length ? ` · ${cfg.course.loopSegments.length} aid seg` : '')
        : (cfg.course.segments?.length || 0) + ' segments'}</strong></div>
    `;

    // Elevation profile
    const svg = document.getElementById('elev-svg');
    const W = 1000, H = 200, padT = 8, padB = 8;
    const usableH = H - padT - padB;
    const eles = gpxPts.map(p => p.ele);
    const elevMin = Math.min(...eles), elevMax = Math.max(...eles);
    const range = Math.max(1, elevMax - elevMin);
    const points = gpxPts.map(p => {
      const x = (p.dist / total) * W;
      const y = padT + usableH - ((p.ele - elevMin) / range) * usableH;
      return [x, y];
    });
    const d = points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    const fillD = d + ` L${W},${H} L0,${H} Z`;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.innerHTML = `
      <path class="area" d="${fillD}" fill="rgba(255,107,61,0.18)"/>
      <path class="line" d="${d}" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
    `;
  }

  async function loadGpx() {
    try {
      const res = await fetch(`races/${encodeURIComponent(slug)}/course.gpx?_=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) return null;
      const text = await res.text();
      return Race.gpx.parse(text);
    } catch (e) { return null; }
  }

  async function load() {
    try {
      const [cfgRes, dataRes] = await Promise.all([
        fetch(`races/${encodeURIComponent(slug)}/config.json?_=${Date.now()}`, { cache: 'no-store' }),
        fetch(`races/${encodeURIComponent(slug)}/data.json?_=${Date.now()}`,   { cache: 'no-store' })
      ]);
      if (!cfgRes.ok) throw new Error('config.json not found');
      if (!dataRes.ok) throw new Error('data.json not found');
      cfg  = await cfgRes.json();
      data = await dataRes.json();
      gpxPts = await loadGpx();

      document.title = `${cfg.name} · Report`;
      document.getElementById('race-title').innerHTML = cfg.name.replace(/(\w+)$/, '<em>$1</em>');
      renderCutoffs();

      const runners = (cfg.runners || []).map(r => {
        const dr = (data.runners || []).find(d => d.id === r.id) || { id: r.id, legs: [] };
        return { ...r, ...dr };
      });
      document.getElementById('runners').innerHTML = runners.map(renderRunner).join('');

      renderCourseBlock();

      document.getElementById('meta').textContent = data.lastUpdated
        ? 'Data: ' + new Date(data.lastUpdated).toLocaleString()
        : 'Pre-race';
    } catch (err) {
      const e = document.getElementById('error');
      e.style.display = 'block';
      e.textContent = `Error: ${err.message}`;
    }
  }

  load();
</script>

</body>
</html>
